@for (item of produtos(); track item) {
    <app-produto
        [nome]="item.nome"
    [preco]="item.preco"
    (produtoSelecionado) = "exibirProduto($event)"
    >
    </app-produto>
}
<p><button (click)="adicionarProduto()">adicionarProduto</button></p>
   <h2>total de produtos: {{totalProdutos()}}</h2>
   <h3>valor total: {{valorTotal() | precoFormatado}}</h3>
   <p><button (click)="substituirProdutos()">substituirProdutos</button></p>
